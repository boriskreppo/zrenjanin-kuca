<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin panel — Zrenjanin kuća</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0ebe5;
      --dark: #3f2419;
      --beige: #bfae9f;
      --beige-light: #d9d0c7;
      --white: #fff;
      --red: #c0392b;
      --green: #27ae60;
      --radius: 8px;
    }

    body {
      font-family: 'Bricolage Grotesque', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-box {
      background: var(--white);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(63,36,25,0.10);
    }

    .login-box h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-box p {
      font-size: 14px;
      color: var(--beige);
      margin-bottom: 32px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .field label { font-size: 13px; font-weight: 600; }
    .field input {
      border: 1.5px solid var(--beige-light);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--dark); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--dark); color: var(--white); width: 100%; }
    .btn-save { background: var(--dark); color: var(--white); }
    .btn-cancel { background: var(--beige-light); color: var(--dark); }
    .btn-danger { background: var(--red); color: var(--white); }
    .btn-sm { padding: 7px 14px; font-size: 13px; }

    .error-msg {
      background: #fde8e6;
      color: var(--red);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      margin-top: 12px;
      display: none;
    }
    .error-msg.show { display: block; }

    /* ── LAYOUT ── */
    #app { display: none; min-height: 100vh; }

    header {
      background: var(--dark);
      color: var(--white);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h2 { font-size: 16px; font-weight: 600; }

    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-right span { font-size: 13px; opacity: 0.7; }

    .btn-logout {
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      padding: 7px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }

    .main { display: flex; min-height: calc(100vh - 60px); }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--white);
      border-right: 1px solid var(--beige-light);
      padding: 24px 0;
    }

    .sidebar-section { margin-bottom: 8px; }
    .sidebar-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--beige);
      padding: 0 20px 8px;
    }

    .sidebar-item {
      display: block;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--dark);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .sidebar-item:hover { background: var(--bg); }
    .sidebar-item.active {
      background: var(--bg);
      border-left-color: var(--dark);
      font-weight: 700;
    }

    /* ── CONTENT ── */
    .content { flex: 1; padding: 32px; overflow-y: auto; }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .content-header h3 { font-size: 22px; font-weight: 700; }

    .lang-tabs { display: flex; gap: 4px; background: var(--beige-light); padding: 4px; border-radius: var(--radius); }
    .lang-tab {
      padding: 6px 16px;
      border: none;
      background: none;
      border-radius: 5px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--beige);
      transition: all 0.15s;
    }
    .lang-tab.active { background: var(--white); color: var(--dark); }

    /* ── EDIT FORM ── */
    .edit-form {
      background: var(--white);
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 720px;
    }

    .form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .form-field label { font-size: 13px; font-weight: 600; color: var(--dark); }
    .form-field input,
    .form-field textarea {
      border: 1.5px solid var(--beige-light);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .form-field input:focus,
    .form-field textarea:focus { border-color: var(--dark); }
    .form-field textarea { min-height: 100px; }

    .form-actions { display: flex; gap: 12px; margin-top: 8px; padding-top: 20px; border-top: 1px solid var(--beige-light); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      background: var(--dark);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 100;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    /* ── GALLERY ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .gallery-item {
      background: var(--bg);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1.5px solid var(--beige-light);
    }

    .gallery-item img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
    }

    .gallery-item-info {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .gallery-item-info input {
      border: 1px solid var(--beige-light);
      border-radius: 5px;
      padding: 5px 8px;
      font-family: inherit;
      font-size: 12px;
      width: 100%;
      outline: none;
    }

    .gallery-item-info input:focus { border-color: var(--dark); }

    .gallery-item-actions { display: flex; justify-content: flex-end; }

    .upload-area {
      border: 2px dashed var(--beige);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 24px;
    }
    .upload-area:hover, .upload-area.drag-over { border-color: var(--dark); background: var(--beige-light); }
    .upload-area p { font-size: 14px; color: var(--beige); margin-top: 8px; }
    .upload-area input { display: none; }

    /* ── LOADING ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      font-size: 15px;
      color: var(--beige);
    }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .content { padding: 20px; }
      .edit-form { padding: 20px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>Admin panel</h1>
    <p>Zrenjanin kuća — upravljanje sadržajem</p>
    <div class="field">
      <label for="password">Lozinka</label>
      <input type="password" id="password" placeholder="Unesite lozinku" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="login-btn">Prijava</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h2>Admin panel — Zrenjanin kuća</h2>
    <div class="header-right">
      <span id="header-status"></span>
      <button class="btn-logout" id="logout-btn">Odjava</button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Sekcije</div>
        <div class="sidebar-item active" data-section="hero">Hero sekcija</div>
        <div class="sidebar-item" data-section="hero_stats">Hero statistike</div>
        <div class="sidebar-item" data-section="osnovne_info">Osnovne informacije</div>
        <div class="sidebar-item" data-section="galerija">Galerija</div>
        <div class="sidebar-item" data-section="detalji">Detalji o kući</div>
        <div class="sidebar-item" data-section="lokacija">O Zrenjaninu</div>
        <div class="sidebar-item" data-section="kontakt">Kontakt</div>
      </div>
    </aside>

    <main class="content" id="content-area">
      <div class="loading">Učitavanje podataka...</div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
const state = {
  token: localStorage.getItem('admin_token') || null,
  data: null,
  currentSection: 'hero',
  currentLang: 'sr',
};

// ── HELPERS ──
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => { t.classList.remove('show'); }, 3500);
}

function fileId(section, lang) {
  return lang === 'en' ? `${section}_en` : section;
}

function getFileData(section, lang) {
  if (!state.data) return null;
  const id = fileId(section, lang);
  return state.data.find(f => f.id === id);
}

// ── AUTH ──
async function login() {
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Prijavljivanje...';

  try {
    const res = await fetch('/api/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Greška.');
    state.token = data.token;
    localStorage.setItem('admin_token', data.token);
    showApp();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Prijava';
  }
}

function logout() {
  state.token = null;
  state.data = null;
  localStorage.removeItem('admin_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('password').value = '';
}

// ── LOAD DATA ──
async function loadData() {
  const content = document.getElementById('content-area');
  content.innerHTML = '<div class="loading">Učitavanje podataka...</div>';

  try {
    const res = await fetch('/api/admin-data', {
      headers: { Authorization: `Bearer ${state.token}` },
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    state.data = data.files;
    renderSection(state.currentSection, state.currentLang);
  } catch {
    content.innerHTML = '<div class="loading">Greška pri učitavanju. Osvežite stranicu.</div>';
  }
}

// ── SHOW APP ──
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

// ── SECTION CONFIG ──
const SECTIONS = {
  hero: {
    label: 'Hero sekcija',
    fields: [
      { key: 'title', label: 'Naslov', type: 'string' },
      { key: 'body', label: 'Opis', type: 'text' },
    ],
  },
  hero_stats: {
    label: 'Hero statistike',
    fields: [
      { key: 'lokacija', label: 'Lokacija', type: 'string' },
      { key: 'povrsina_nekretnine', label: 'Površina nekretnine', type: 'string' },
      { key: 'povrsina_placa', label: 'Površina placa', type: 'string' },
      { key: 'broj_prostorija', label: 'Broj prostorija', type: 'string' },
      { key: 'garaza', label: 'Broj garažnih mesta', type: 'string' },
      { key: 'cena', label: 'Cena', type: 'string' },
    ],
  },
  osnovne_info: {
    label: 'Osnovne informacije',
    fields: [
      { key: 'title', label: 'Naslov', type: 'string' },
      { key: 'body', label: 'Opis', type: 'text' },
      { key: 'broj_prostorija', label: 'Broj prostorija', type: 'string' },
      { key: 'letnjikovac', label: 'Letnjikovac', type: 'string' },
      { key: 'spavace_sobe', label: 'Broj spavaćih soba', type: 'string' },
      { key: 'paunovi', label: 'Broj paunova', type: 'string' },
    ],
  },
  galerija: {
    label: 'Galerija',
    type: 'gallery',
    fields: [
      { key: 'title', label: 'Naslov', type: 'string' },
      { key: 'body', label: 'Opis', type: 'text' },
    ],
  },
  detalji: {
    label: 'Detalji o kući',
    fields: [
      { key: 'title', label: 'Naslov', type: 'string' },
      { key: 'tekst1', label: 'Tekst 1', type: 'text' },
      { key: 'tekst2', label: 'Tekst 2', type: 'text' },
      { key: 'opremljenost_label', label: 'Opremljenost — labela', type: 'string' },
      { key: 'opremljenost_tekst', label: 'Opremljenost — tekst', type: 'string' },
    ],
  },
  lokacija: {
    label: 'O Zrenjaninu',
    fields: [
      { key: 'title', label: 'Naslov', type: 'string' },
      { key: 'body', label: 'Opis', type: 'text' },
      { key: 'cta', label: 'CTA tekst', type: 'string' },
      { key: 'stanovnici', label: 'Broj stanovnika', type: 'string' },
      { key: 'manifestacije', label: 'Broj manifestacija', type: 'string' },
      { key: 'website', label: 'Vebsajt', type: 'string' },
    ],
  },
  kontakt: {
    label: 'Kontakt',
    fields: [
      { key: 'title', label: 'Naslov', type: 'string' },
      { key: 'body', label: 'Opis', type: 'text' },
      { key: 'email', label: 'Email adresa', type: 'string' },
      { key: 'telefon', label: 'Broj telefona', type: 'string' },
    ],
  },
};

// ── RENDER SECTION ──
function renderSection(section, lang) {
  const cfg = SECTIONS[section];
  const fileData = getFileData(section, lang);
  const content = document.getElementById('content-area');

  const langLabel = lang === 'sr' ? 'srpski' : 'engleski';
  const title = cfg.label;

  let html = `
    <div class="content-header">
      <h3>${title}</h3>
      <div class="lang-tabs">
        <button class="lang-tab ${lang === 'sr' ? 'active' : ''}" data-lang="sr">Srpski</button>
        <button class="lang-tab ${lang === 'en' ? 'active' : ''}" data-lang="en">English</button>
      </div>
    </div>
  `;

  if (!fileData) {
    html += `<div class="loading">Podaci nisu pronađeni.</div>`;
    content.innerHTML = html;
    return;
  }

  if (cfg.type === 'gallery') {
    html += renderGallery(fileData, cfg, lang);
  } else {
    html += renderForm(fileData, cfg, lang);
  }

  content.innerHTML = html;
  bindLangTabs();
  if (cfg.type === 'gallery') {
    bindGallery(fileData, lang);
  } else {
    bindForm(fileData, cfg, lang);
  }
}

// ── TEXT FORM ──
function renderForm(fileData, cfg, lang) {
  const { content } = fileData;
  let fields = '';
  for (const f of cfg.fields) {
    const val = (content[f.key] || '').replace(/"/g, '&quot;');
    if (f.type === 'text') {
      fields += `
        <div class="form-field">
          <label for="field-${f.key}">${f.label}</label>
          <textarea id="field-${f.key}" data-key="${f.key}">${content[f.key] || ''}</textarea>
        </div>`;
    } else {
      fields += `
        <div class="form-field">
          <label for="field-${f.key}">${f.label}</label>
          <input type="text" id="field-${f.key}" data-key="${f.key}" value="${val}">
        </div>`;
    }
  }
  return `
    <div class="edit-form">
      ${fields}
      <div class="form-actions">
        <button class="btn btn-save" id="save-btn">Sačuvaj</button>
      </div>
      <div class="error-msg" id="form-error"></div>
    </div>`;
}

function bindForm(fileData, cfg, lang) {
  document.getElementById('save-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('save-btn');
    const errEl = document.getElementById('form-error');
    errEl.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Čuvanje...';

    const newContent = { ...fileData.content };
    for (const f of cfg.fields) {
      const el = document.getElementById(`field-${f.key}`);
      if (el) newContent[f.key] = el.value;
    }

    try {
      const res = await fetch('/api/admin-save', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${state.token}`,
        },
        body: JSON.stringify({ path: fileData.path, content: newContent, sha: fileData.sha }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Greška.');
      fileData.sha = data.sha;
      fileData.content = newContent;
      showToast('Uspešno sačuvano!');
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
      showToast(err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sačuvaj';
    }
  });
}

// ── GALLERY ──
function renderGallery(fileData, cfg, lang) {
  const { content } = fileData;
  const slike = content.slike || [];

  let fields = '';
  for (const f of cfg.fields) {
    const val = (content[f.key] || '').replace(/"/g, '&quot;');
    fields += `
      <div class="form-field">
        <label for="field-${f.key}">${f.label}</label>
        <input type="text" id="field-${f.key}" data-key="${f.key}" value="${val}">
      </div>`;
  }

  let gridItems = '';
  slike.forEach((slika, i) => {
    gridItems += `
      <div class="gallery-item" data-index="${i}">
        <img src="${slika.src}" alt="${slika.alt || ''}" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'160\\' height=\\'120\\'><rect fill=\\'%23bfae9f\\' width=\\'160\\' height=\\'120\\'/></svg>'">
        <div class="gallery-item-info">
          <input type="text" class="alt-input" data-index="${i}" value="${(slika.alt || '').replace(/"/g, '&quot;')}" placeholder="Opis slike (alt)">
          <div class="gallery-item-actions">
            <button class="btn btn-danger btn-sm delete-img-btn" data-index="${i}">Ukloni</button>
          </div>
        </div>
      </div>`;
  });

  return `
    <div class="edit-form" style="max-width:900px">
      ${fields}
      <div class="form-field" style="margin-top:8px">
        <label>Slike galerije</label>
      </div>
      <div class="upload-area" id="upload-area">
        <input type="file" id="file-input" accept="image/*" multiple>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#bfae9f" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>Kliknite ili prevucite slike ovde</p>
        <p style="font-size:12px">PNG, JPG, WebP — max 5MB po slici</p>
      </div>
      <div class="gallery-grid" id="gallery-grid">${gridItems}</div>
      <div class="form-actions">
        <button class="btn btn-save" id="save-btn">Sačuvaj sve promene</button>
      </div>
      <div class="error-msg" id="form-error"></div>
    </div>`;
}

function bindGallery(fileData, lang) {
  const uploadArea = document.getElementById('upload-area');
  const fileInput = document.getElementById('file-input');

  uploadArea.addEventListener('click', () => fileInput.click());
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    handleFiles(Array.from(e.dataTransfer.files), fileData, lang);
  });
  fileInput.addEventListener('change', () => {
    handleFiles(Array.from(fileInput.files), fileData, lang);
    fileInput.value = '';
  });

  document.querySelectorAll('.delete-img-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.index);
      fileData.content.slike.splice(i, 1);
      renderSection(state.currentSection, state.currentLang);
    });
  });

  document.querySelectorAll('.alt-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const i = parseInt(inp.dataset.index);
      if (fileData.content.slike[i]) {
        fileData.content.slike[i].alt = inp.value;
      }
    });
  });

  bindForm(fileData, SECTIONS[state.currentSection], lang);
}

async function handleFiles(files, fileData, lang) {
  for (const file of files) {
    if (file.size > 5 * 1024 * 1024) {
      showToast(`${file.name}: fajl je prevelik (max 5MB)`, 'error');
      continue;
    }

    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64 = e.target.result;
      try {
        const res = await fetch('/api/admin-upload', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${state.token}`,
          },
          body: JSON.stringify({ filename: file.name, content: base64 }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Greška.');
        if (!fileData.content.slike) fileData.content.slike = [];
        fileData.content.slike.push({ src: data.path, alt: '' });
        showToast(`${file.name} uspešno otpremljena!`);
        renderSection(state.currentSection, state.currentLang);
      } catch (err) {
        showToast(`Greška: ${err.message}`, 'error');
      }
    };
    reader.readAsDataURL(file);
  }
}

// ── BIND LANG TABS ──
function bindLangTabs() {
  document.querySelectorAll('.lang-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.currentLang = tab.dataset.lang;
      renderSection(state.currentSection, state.currentLang);
    });
  });
}

// ── SIDEBAR ──
document.querySelectorAll('.sidebar-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    state.currentSection = item.dataset.section;
    renderSection(state.currentSection, state.currentLang);
  });
});

// ── LOGIN EVENTS ──
document.getElementById('login-btn').addEventListener('click', login);
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
document.getElementById('logout-btn').addEventListener('click', logout);

// ── INIT ──
if (state.token) {
  showApp();
} else {
  document.getElementById('login-screen').style.display = 'flex';
}
</script>
