    <script>
        /* CMS — učitavanje EN JSON podataka */
        (function() {
            const dataFiles = ['hero', 'hero_stats', 'osnovne_info', 'galerija', 'detalji', 'lokacija', 'kontakt'];
            const data = {};

            Promise.all(
                dataFiles.map(name =>
                    fetch('https://raw.githubusercontent.com/boriskreppo/zrenjanin-kuca/main/_data/en/' + name + '.json?t=' + Date.now(), { cache: 'no-store' })
                        .then(r => r.json())
                        .then(json => { data[name] = json; })
                )
            ).then(() => {
                document.querySelectorAll('[data-cms]').forEach(el => {
                    const [file, key] = el.getAttribute('data-cms').split('.');
                    if (data[file] && data[file][key] !== undefined) {
                        el.textContent = data[file][key];
                    }
                    const hrefTemplate = el.getAttribute('data-cms-href');
                    if (hrefTemplate) {
                        el.href = hrefTemplate
                            .replace('{kontakt.email}', data.kontakt.email)
                            .replace('{kontakt.telefon}', data.kontakt.telefon.replace(/\s/g, ''));
                    }
                });

                // Gallery images
                if (data.galerija && data.galerija.slike) {
                    const track = document.querySelector('.gallery-images');
                    track.innerHTML = '';
                    data.galerija.slike.forEach(slika => {
                        const img = document.createElement('img');
                        img.className = 'img-1-icon';
                        img.src = slika.src;
                        img.alt = slika.alt || '';
                        track.appendChild(img);
                    });
                    initGallery();
                }

                // Hero carousel from JSON
                if (data.hero && data.hero.slike && data.hero.slike.length) {
                    const carousel = document.getElementById('hero-carousel');
                    data.hero.slike.forEach((slika, i) => {
                        const img = document.createElement('img');
                        img.className = 'hero-slide' + (i === 0 ? ' active' : '');
                        img.src = slika.src;
                        img.alt = slika.alt || '';
                        carousel.appendChild(img);
                    });
                    initHeroCarousel();
                }

                // Detalji slika
                if (data.detalji && data.detalji.slika) {
                    const el = document.getElementById('detalji-slika');
                    if (el) el.src = data.detalji.slika;
                }
            });
        })();

        // Gallery — infinite scroll + drag + arrows
        function initGallery() {
            const track = document.querySelector('.gallery-images');
            if (!track) return;

            const originals = Array.from(track.querySelectorAll('img'));
            originals.forEach(img => track.appendChild(img.cloneNode(true)));
            originals.forEach(img => track.insertBefore(img.cloneNode(true), track.firstChild));

            const getItemWidth = () => {
                const img = track.querySelector('img');
                const next = img.nextElementSibling;
                if (next) return next.getBoundingClientRect().left - img.getBoundingClientRect().left;
                return img.offsetWidth + 8;
            };

            const setStart = () => { track.scrollLeft = getItemWidth() * originals.length; };
            requestAnimationFrame(setStart);

            track.addEventListener('scroll', () => {
                const w = getItemWidth() * originals.length;
                if (track.scrollLeft < w * 0.25) {
                    track.scrollLeft += w;
                } else if (track.scrollLeft > w * 1.75) {
                    track.scrollLeft -= w;
                }
            }, { passive: true });

            let isDown = false, startX, scrollLeft;
            track.addEventListener('mousedown', e => {
                isDown = true;
                track.classList.add('is-dragging');
                startX = e.pageX - track.offsetLeft;
                scrollLeft = track.scrollLeft;
            });
            track.addEventListener('mouseleave', () => { isDown = false; track.classList.remove('is-dragging'); });
            track.addEventListener('mouseup', () => { isDown = false; track.classList.remove('is-dragging'); });
            track.addEventListener('mousemove', e => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - track.offsetLeft;
                track.scrollLeft = scrollLeft - (x - startX);
            });

            document.querySelector('.arrow-forward-btn').addEventListener('click', () => {
                track.scrollBy({ left: itemWidth(), behavior: 'smooth' });
            });
            document.querySelector('.arrow-back-btn').addEventListener('click', () => {
                track.scrollBy({ left: -itemWidth(), behavior: 'smooth' });
            });
        }

        /* MOBILE — gallery dots */
        (function() {
            const dotsContainer = document.querySelector('.gallery-dots');
            const galleryImages = document.querySelector('.gallery-images');
            if (!dotsContainer || !galleryImages) return;

            const totalSlides = galleryImages.querySelectorAll('img').length;

            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dotsContainer.appendChild(dot);
            }

            galleryImages.addEventListener('scroll', () => {
                const itemWidth = galleryImages.querySelector('img').offsetWidth + 8;
                const index = Math.round(galleryImages.scrollLeft / itemWidth);
                dotsContainer.querySelectorAll('.dot').forEach((d, i) => {
                    d.classList.toggle('active', i === index);
                });
            });
        })();

        /* MOBILE — location dots */
        (function() {
            const dotsContainer = document.querySelector('.loc-dots');
            const wrapper = document.querySelector('.section-5-cards-wrapper');
            if (!dotsContainer || !wrapper) return;
            wrapper.addEventListener('scroll', () => {
                const itemWidth = 294 + 12;
                const index = Math.round(wrapper.scrollLeft / itemWidth);
                dotsContainer.querySelectorAll('.dot').forEach((d, i) => {
                    d.classList.toggle('active', i === index);
                });
            });
        })();

        /* LOCATION CAROUSEL — infinite loop (desktop only) */
        if (window.innerWidth > 768) {
        const track = document.getElementById('section-5-track');
        const step = 294 + 12;

        const origCards = Array.from(track.children);
        origCards.forEach(card => track.appendChild(card.cloneNode(true)));

        const totalCards = origCards.length;
        let locOffset = 0;

        function moveTrack(animate) {
            track.style.transition = animate ? 'transform 0.4s ease' : 'none';
            track.style.transform = `translateX(-${locOffset}px)`;
        }

        document.getElementById('loc-next').addEventListener('click', () => {
            locOffset += step;
            moveTrack(true);
            if (locOffset >= totalCards * step) {
                setTimeout(() => {
                    locOffset = 0;
                    moveTrack(false);
                }, 400);
            }
        });

        document.getElementById('loc-prev').addEventListener('click', () => {
            if (locOffset <= 0) {
                locOffset = totalCards * step;
                moveTrack(false);
                setTimeout(() => {
                    locOffset -= step;
                    moveTrack(true);
                }, 20);
            } else {
                locOffset -= step;
                moveTrack(true);
            }
        });
        }

        /* BURGER MENU */
        (function() {
            const menu = document.getElementById('burger-menu');
            const openBtn = document.querySelector('.nav-hamburger');
            const closeBtn = document.getElementById('burger-close');

            function openMenu() {
                menu.classList.add('is-open');
                menu.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            }

            function closeMenu() {
                menu.classList.remove('is-open');
                menu.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
            }

            openBtn.addEventListener('click', openMenu);
            closeBtn.addEventListener('click', closeMenu);

            menu.querySelectorAll('.burger-item').forEach(link => {
                link.addEventListener('click', closeMenu);
            });
            menu.querySelector('.burger-cta').addEventListener('click', closeMenu);
        })();

        // Hero carousel
        function initHeroCarousel() {
            const slides = document.querySelectorAll('.hero-slide');
            if (slides.length < 2) return;
            let current = 0;
            function goTo(index) {
                slides[current].classList.remove('active');
                current = (index + slides.length) % slides.length;
                slides[current].classList.add('active');
            }
            setInterval(() => goTo(current + 1), 4000);
        }
    </script>
